<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout (~{::body},'schools')}">

<body>

<div class="container mt-4">

  <div class="mb-4 pb-2 border-bottom d-flex justify-content-between align-items-center">
    <h1><span th:text="${school.name}">School Name</span> Intramurals</h1>
    <a th:if="${canEdit}"
       th:href="@{|/schools/${school.id}/edit|}"
       class="btn btn-outline-primary">Edit School
    </a>
  </div>

  <div class="row">

    <div class="col-lg-9 mb-4">

      <!-- ========================= -->
      <!-- 🔥 NEW LEAGUE SECTION HERE -->
      <!-- ========================= -->

      <div class="d-flex justify-content-between align-items-center">
        <h2>Intramural Leagues</h2>
        <a th:href="@{|/schools/${school.id}/leagues/new|}"
           th:if="${canEdit}"
           class="btn btn-primary mt-0">Create League</a>
      </div>

      <!-- Empty-state message -->
      <p th:if="${leagues.isEmpty()}" class="text-muted mt-3">
        There are no active leagues
